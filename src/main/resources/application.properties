spring.application.name=ecom-project


# MySQL DataSource
# spring.datasource.url=jdbc:mysql://localhost:3306/ecom_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=ecom_user
